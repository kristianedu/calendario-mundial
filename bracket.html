<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Bracket Mundial 2026 - Fase Eliminatoria</title>
    <meta name="description" content="Bracket interactivo del Mundial FIFA 2026. Sigue la fase eliminatoria en tiempo real con marcadores y clasificados actualizados.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: rgba(255,255,255,0.03);
            --bg-card-hover: rgba(255,255,255,0.07);
            --bg-card-finished: rgba(34,197,94,0.06);
            --bg-card-live: rgba(239,68,68,0.08);
            --border: rgba(255,255,255,0.06);
            --border-hl: rgba(255,255,255,0.12);
            --text-1: #e6edf3;
            --text-2: #8b949e;
            --text-3: #484f58;
            --gold: #fbbf24;
            --green: #22c55e;
            --red: #ef4444;
            --blue: #58a6ff;
            --line: rgba(255,255,255,0.06);
            --line-active: rgba(251,191,36,0.25);
            --font: 'Inter', -apple-system, sans-serif;
            --r: 6px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            background: var(--bg-primary);
            color: var(--text-1);
            font-family: var(--font);
            min-height: 100vh;
        }
        body {
            background:
                radial-gradient(ellipse at 15% 0%, rgba(59,130,246,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 0%, rgba(168,85,247,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(251,191,36,0.03) 0%, transparent 50%),
                var(--bg-primary);
            overflow-x: auto;
        }

        /* ═══ HEADER ═══ */
        .header {
            text-align: center;
            padding: 24px 20px 8px;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header h1 .h1-trophy {
            -webkit-text-fill-color: initial;
            background: none;
            filter: drop-shadow(0 0 8px rgba(251,191,36,0.3));
        }
        .header h1 {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .h1-trophy-img {
            height: 1.5em;
            width: auto;
            filter: drop-shadow(0 0 10px rgba(251,191,36,0.35));
        }
        .header .sub {
            font-size: 0.65rem;
            color: var(--text-2);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .last-updated {
            font-size: 0.6rem;
            color: var(--text-3);
            margin-top: 4px;
        }

        /* ═══ MAIN BRACKET LAYOUT ═══ */
        .bracket-wrapper {
            display: flex;
            justify-content: center;
            padding: 12px 16px 40px;
            min-width: fit-content;
        }
        .bracket {
            display: flex;
            align-items: stretch;
            gap: 0;
            position: relative;
        }

        /* ═══ GROUP PANELS (left/right edges) ═══ */
        .groups-panel {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 8px;
            justify-content: center;
            min-width: 120px;
        }
        .group-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 6px 7px;
            transition: all 0.2s ease;
        }
        .group-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hl);
        }
        .group-card.complete {
            border-color: rgba(34,197,94,0.12);
        }
        .group-title {
            font-size: 0.5rem;
            font-weight: 700;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .group-title .status-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.complete { background: var(--green); }
        .status-dot.pending { background: var(--text-3); }
        .group-team-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 1.5px 0;
            font-size: 0.6rem;
        }
        .group-team-row.qualified .gt-name { color: var(--text-1); font-weight: 600; }
        .group-team-row.possible .gt-name { color: var(--gold); }
        .group-team-row.eliminated .gt-name { color: var(--text-3); }
        .gt-pos {
            font-size: 0.5rem;
            color: var(--text-3);
            width: 10px;
            text-align: center;
            font-weight: 600;
        }
        .gt-flag { font-size: 0.7rem; line-height: 1; }
        .gt-name {
            flex: 1;
            color: var(--text-2);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gt-pts {
            font-size: 0.55rem;
            font-weight: 700;
            color: var(--text-2);
            min-width: 16px;
            text-align: right;
        }
        .gt-dg {
            font-size: 0.5rem;
            color: var(--text-3);
            min-width: 18px;
            text-align: right;
        }

        /* ═══ ROUND COLUMNS ═══ */
        .round {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 130px;
            padding: 0 4px;
        }
        .round-label {
            font-size: 0.5rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-3);
            margin-bottom: 10px;
            text-align: center;
            white-space: nowrap;
        }
        .round-matches {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            flex: 1;
            width: 100%;
        }

        /* ═══ MATCH CARD ═══ */
        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 5px 7px;
            width: 122px;
            margin: 3px 0;
            transition: all 0.25s ease;
            position: relative;
            backdrop-filter: blur(6px);
        }
        .match-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hl);
            transform: scale(1.05);
            z-index: 10;
        }
        .match-card.finished {
            background: var(--bg-card-finished);
            border-color: rgba(34,197,94,0.12);
        }
        .match-card.live {
            background: var(--bg-card-live);
            border-color: rgba(239,68,68,0.25);
            animation: livePulse 2s ease-in-out infinite;
        }
        @keyframes livePulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.15); }
            50% { box-shadow: 0 0 10px 2px rgba(239,68,68,0.1); }
        }

        .team-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2.5px 0;
        }
        .team-row + .team-row {
            border-top: 1px solid var(--border);
        }
        .team-row.winner .team-name { color: var(--text-1); font-weight: 700; }
        .team-row.loser { opacity: 0.35; }
        .team-row.pickable { cursor: pointer; border-radius: 3px; transition: background 0.12s ease; }
        .team-row.pickable:hover { background: rgba(88,166,255,0.12); }
        .match-card.simulated {
            border-color: rgba(251,191,36,0.4);
            box-shadow: inset 3px 0 0 var(--gold);
        }

        /* ═══ SIMULATION BAR ═══ */
        .sim-bar {
            display: flex; justify-content: center; align-items: center;
            gap: 12px; flex-wrap: wrap;
            padding: 8px 16px 0;
        }
        .sim-hint { font-size: 0.72rem; color: var(--text-2); }
        .sim-reset {
            background: var(--bg-card); border: 1px solid var(--border-hl);
            color: var(--text-1); font-family: var(--font);
            font-size: 0.72rem; font-weight: 600;
            padding: 6px 14px; border-radius: 999px; cursor: pointer;
            transition: all 0.2s ease;
        }
        .sim-reset:hover { background: var(--bg-card-hover); border-color: var(--gold); color: var(--gold); }
        .team-flag { font-size: 0.8rem; line-height: 1; flex-shrink: 0; }
        .team-name {
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-2);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.3px;
        }
        .team-name.tbd { color: var(--text-3); font-style: italic; font-weight: 400; }
        .team-score {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-1);
            min-width: 12px;
            text-align: center;
        }
        .team-score.no-score { color: var(--text-3); font-weight: 400; }
        .team-pen { font-size: 0.85em; font-weight: 700; color: var(--text-3); }
        .match-date {
            font-size: 0.45rem;
            color: var(--text-3);
            text-align: center;
            margin-top: 2px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 0.45rem;
            color: var(--red);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .live-dot {
            width: 4px; height: 4px;
            background: var(--red);
            border-radius: 50%;
            animation: dotPulse 1s ease-in-out infinite;
        }
        @keyframes dotPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        /* ═══ CENTER COLUMN ═══ */
        .center-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 150px;
            padding: 0 8px;
            gap: 16px;
        }
        .champion-area { text-align: center; }
        .trophy {
            font-size: 2.5rem;
            display: block;
            filter: drop-shadow(0 0 16px rgba(251,191,36,0.25));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);} }
        .champion-label {
            font-size: 0.55rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            margin-top: 4px;
        }
        .champion-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-1);
            margin-top: 3px;
        }
        .champion-flag { font-size: 1.8rem; display: block; margin-top: 3px; }
        .round-tag {
            display: inline-block;
            font-size: 0.45rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 2px 7px;
            border-radius: 3px;
            margin-top: 3px;
        }
        .round-tag.final-tag {
            background: rgba(251,191,36,0.12);
            color: var(--gold);
            border: 1px solid rgba(251,191,36,0.2);
        }
        .round-tag.bronze-tag {
            background: rgba(205,127,50,0.12);
            color: #cd7f32;
            border: 1px solid rgba(205,127,50,0.18);
        }

        /* ═══ SVG CONNECTORS ═══ */
        .connectors-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .connector-line {
            stroke: var(--line);
            stroke-width: 1;
            fill: none;
        }
        .connector-line.active {
            stroke: var(--line-active);
            stroke-width: 1.5;
        }

        /* ═══ RESPONSIVE ═══ */
        @media (max-width: 1400px) {
            .bracket-wrapper { justify-content: flex-start; }
        }
        ::-webkit-scrollbar { height: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--text-3); border-radius: 3px; }

        /* ═══ LOADING ═══ */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 14px;
        }
        .loading-spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to{transform:rotate(360deg);} }
        .loading-text { font-size: 0.75rem; color: var(--text-2); }

        .footer {
            text-align: center;
            padding: 16px;
            font-size: 0.55rem;
            color: var(--text-3);
            border-top: 1px solid var(--border);
            margin-top: 16px;
        }

        /* ═══ TABS ═══ */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            padding: 6px 16px 4px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-2);
            font-family: var(--font);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            padding: 8px 18px;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tab-btn:hover { background: var(--bg-card-hover); color: var(--text-1); }
        .tab-btn.active {
            background: rgba(251,191,36,0.12);
            border-color: rgba(251,191,36,0.3);
            color: var(--gold);
        }
        .view.hidden { display: none; }

        /* ═══ GROUPS GRID (groups tab) ═══ */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 12px;
            max-width: 1120px;
            margin: 0 auto;
            padding: 14px 16px 8px;
        }
        .standings {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .standings.complete { border-color: rgba(34,197,94,0.15); }
        .standings-head {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px;
            font-size: 0.86rem; font-weight: 700; color: var(--text-1);
            border-bottom: 1px solid var(--border);
        }
        .standings-head .badge {
            font-size: 0.58rem; color: var(--text-3); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        table.tbl { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        table.tbl th {
            font-size: 0.58rem; font-weight: 600; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 7px 3px; text-align: center;
        }
        table.tbl th.l, table.tbl td.l { text-align: left; }
        table.tbl td { padding: 7px 3px; text-align: center; color: var(--text-2); }
        table.tbl tbody tr { border-top: 1px solid var(--border); }
        table.tbl .tname {
            color: var(--text-1); font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            max-width: 130px;
        }
        table.tbl .pts { font-weight: 700; color: var(--text-1); }
        table.tbl tr.qualified td:first-child { box-shadow: inset 3px 0 0 var(--green); }
        table.tbl tr.possible td:first-child { box-shadow: inset 3px 0 0 var(--gold); }
        table.tbl tr.eliminated .tname { color: var(--text-3); }
        table.tbl tr.eliminated td { opacity: 0.6; }
        .flag-cell { font-size: 1.15rem; line-height: 1; }
        .grp-badge {
            display: inline-block; font-size: 0.58rem; font-weight: 700;
            color: var(--text-2); background: var(--bg-card-hover);
            border-radius: 4px; padding: 2px 6px;
        }

        /* ═══ BEST THIRDS TABLE ═══ */
        .thirds-wrap { max-width: 720px; margin: 0 auto; padding: 8px 16px 32px; }
        .thirds-title {
            font-size: 1.1rem; font-weight: 800; color: var(--text-1);
            margin: 14px 0 8px;
        }
        .thirds-wrap .standings { padding: 0; }
        .legend {
            display: flex; gap: 18px; font-size: 0.6rem; color: var(--text-2);
            margin-top: 12px; flex-wrap: wrap;
        }
        .legend .dot {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 6px; vertical-align: middle;
        }

        /* ═══ RESUMEN (overview) ═══ */
        .resumen { max-width: 1000px; margin: 0 auto; padding: 14px 16px 32px; }
        .resumen-cols {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 14px;
        }
        .fx-block, .scorers-wrap {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .fx-title {
            font-size: 0.92rem; font-weight: 700; color: var(--text-1);
            padding: 12px 16px; border-bottom: 1px solid var(--border);
        }
        .fx-list { display: flex; flex-direction: column; }
        .fx-empty { padding: 16px; font-size: 0.78rem; color: var(--text-3); text-align: center; }
        .fx-row {
            display: grid;
            grid-template-columns: 58px 1fr auto 1fr 46px;
            align-items: center;
            gap: 7px;
            padding: 10px 14px;
            font-size: 0.8rem;
        }
        .fx-row + .fx-row { border-top: 1px solid var(--border); }
        .fx-row.live { background: var(--bg-card-live); }
        .fx-comp {
            font-size: 0.56rem; color: var(--text-3); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .fx-team { display: flex; align-items: center; gap: 6px; min-width: 0; }
        .fx-team.r { justify-content: flex-end; }
        .fx-team.l { justify-content: flex-start; }
        .fx-name {
            color: var(--text-2); font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .fx-team.win .fx-name { color: var(--text-1); font-weight: 700; }
        .fx-flag { font-size: 1.2rem; line-height: 1; flex-shrink: 0; }
        .fx-mid { text-align: center; min-width: 40px; }
        .fx-score { font-weight: 800; color: var(--text-1); font-size: 0.88rem; }
        .fx-dash { color: var(--text-3); margin: 0 1px; }
        .fx-time { font-size: 0.72rem; color: var(--text-2); font-weight: 600; }
        .fx-live {
            display: inline-flex; align-items: center; gap: 3px;
            color: var(--red); font-weight: 800; font-size: 0.82rem;
        }
        .fx-date {
            font-size: 0.58rem; color: var(--text-3); text-align: right;
            white-space: nowrap;
        }

        .scorers-wrap { margin-top: 16px; }
        .scorers-list { display: flex; flex-direction: column; }
        .sc-row {
            display: grid;
            grid-template-columns: 26px 30px minmax(130px, 1.4fr) 2fr 34px;
            align-items: center;
            gap: 9px;
            padding: 9px 16px;
            font-size: 0.82rem;
        }
        .sc-row + .sc-row { border-top: 1px solid var(--border); }
        .sc-pos { color: var(--text-3); font-weight: 700; text-align: center; font-size: 0.72rem; }
        .sc-flag { font-size: 1.3rem; line-height: 1; text-align: center; }
        .sc-info { display: flex; flex-direction: column; min-width: 0; }
        .sc-name {
            color: var(--text-1); font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sc-country { font-size: 0.62rem; color: var(--text-3); }
        .sc-bar {
            height: 7px; background: var(--bg-card-hover);
            border-radius: 3px; overflow: hidden;
        }
        .sc-bar-fill {
            display: block; height: 100%;
            background: linear-gradient(90deg, rgba(251,191,36,0.5), var(--gold));
            border-radius: 3px;
        }
        .sc-goals { font-weight: 800; color: var(--gold); text-align: right; }
        .scorers-foot {
            padding: 8px 14px; font-size: 0.5rem; color: var(--text-3);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><img class="h1-trophy-img" src="trofeo.png" alt="🏆"
            onerror="this.outerHTML='&lt;span class=\'h1-trophy\'&gt;🏆&lt;/span&gt;'"> Copa Mundial FIFA 2026</h1>
        <div class="sub">Fase Eliminatoria</div>
        <div class="last-updated" id="lastUpdated"></div>
    </header>

    <div id="app">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">Cargando bracket...</div>
        </div>
    </div>

    <footer class="footer">
        Copa Mundial FIFA 2026™ — Estados Unidos, México y Canadá · Actualización automática
    </footer>

    <script>
    (function() {
        'use strict';

        const DATA_URL = 'bracket_data.json';

        // Left bracket groups (A-F) and right bracket groups (G-L)
        const LEFT_GROUPS = ['A', 'B', 'C', 'D', 'E', 'F'];
        const RIGHT_GROUPS = ['G', 'H', 'I', 'J', 'K', 'L'];

        // Datos cargados + estado de simulación (en memoria, NO se guarda).
        let DATA = null;
        let currentTab = 'bracket';
        const sim = { picks: {} };   // picks[koNum] = 'team1' | 'team2'

        async function init() {
            try {
                const res = await fetch(DATA_URL + '?t=' + Date.now());
                DATA = await res.json();
                renderApp(DATA);
                document.getElementById('lastUpdated').textContent =
                    'Última actualización: ' + DATA.lastUpdated;
            } catch (err) {
                document.getElementById('app').innerHTML =
                    '<div class="loading"><div class="loading-text">Error al cargar datos</div></div>';
                console.error(err);
            }
        }

        // ─── App shell with tabs ─────────────────────────────
        function renderApp(data) {
            const resolved = resolveState(data);
            const active = currentTab;
            const html = `
                <div class="tabs">
                    <button class="tab-btn ${active==='bracket'?'active':''}" data-tab="bracket">🏆 Bracket</button>
                    <button class="tab-btn ${active==='resumen'?'active':''}" data-tab="resumen">📰 Resumen</button>
                    <button class="tab-btn ${active==='groups'?'active':''}" data-tab="groups">📊 Grupos</button>
                </div>
                <div id="view-bracket" class="view ${active==='bracket'?'':'hidden'}">${buildBracketHtml(resolved)}</div>
                <div id="view-resumen" class="view ${active==='resumen'?'':'hidden'}">${buildResumenView(data)}</div>
                <div id="view-groups" class="view ${active==='groups'?'':'hidden'}">${buildGroupsView(data)}</div>
            `;
            document.getElementById('app').innerHTML = html;
            wireTabs();
            requestAnimationFrame(() => drawConnectors());
        }

        // ─── Simulation resolver ─────────────────────────────
        // Construye una copia resuelta del cuadro: rellena los slots indefinidos
        // con los ganadores reales (bloqueados) o simulados (picks), en cascada.
        function resolveState(data) {
            const byKo = {};
            const collect = m => { if (m) byKo[m.koNum] = JSON.parse(JSON.stringify(m)); };
            ['round_of_32','round_of_16','quarter_finals','semi_finals']
                .forEach(r => data.rounds[r].forEach(collect));
            collect(data.rounds.third_place);
            collect(data.rounds.final);

            // childOf[targetKo][slot] = { from: koOrigen, type: 'winner'|'loser' }
            const childOf = {};
            Object.values(byKo).forEach(m => {
                if (m.winnerTo) (childOf[m.winnerTo.ko] = childOf[m.winnerTo.ko] || {})[m.winnerTo.slot] = { from: m.koNum, type: 'winner' };
                if (m.loserTo)  (childOf[m.loserTo.ko]  = childOf[m.loserTo.ko]  || {})[m.loserTo.slot]  = { from: m.koNum, type: 'loser' };
            });

            const eff = {};   // ko -> { winner, loser, slot }
            const kos = Object.keys(byKo).map(Number).sort((a, b) => a - b);
            for (const ko of kos) {
                const m = byKo[ko];
                // Rellenar SOLO los slots placeholder desde el resultado aguas arriba
                for (const slot of ['team1', 'team2']) {
                    const c = childOf[ko] && childOf[ko][slot];
                    if (c && m[slot].placeholder) {
                        const fe = eff[c.from];
                        const t = fe ? (c.type === 'winner' ? fe.winner : fe.loser) : null;
                        // score/pen en null: el equipo que avanza no arrastra el
                        // marcador ni la tanda de penales de su partido anterior.
                        if (t) m[slot] = Object.assign({}, t, { score: null, pen: null });
                    }
                }
                // Determinar ganador: real (bloqueado) tiene prioridad; si no, pick.
                let wslot = null, locked = false, simWin = false;
                if (m.status === 'finished' && m.winner) {
                    wslot = m.winner; locked = true;
                } else if (sim.picks[ko]) {
                    const pk = sim.picks[ko];
                    // El pick sigue siendo válido solo si el equipo elegido continúa
                    // ocupando ese slot (si cambió aguas arriba, se invalida en cascada).
                    if (!m.team1.placeholder && !m.team2.placeholder && m[pk.slot].fullName === pk.team) {
                        wslot = pk.slot; simWin = true;
                    } else {
                        delete sim.picks[ko];
                    }
                }
                m._locked = locked;
                m._pickedSlot = wslot;
                m._simWinner = simWin;
                m._pickable = !locked && !m.team1.placeholder && !m.team2.placeholder;
                eff[ko] = wslot
                    ? { winner: m[wslot], loser: m[wslot === 'team1' ? 'team2' : 'team1'], slot: wslot }
                    : { winner: null, loser: null, slot: null };
            }

            const mapArr = arr => arr.map(m => byKo[m.koNum]);
            const finalKo = data.rounds.final ? data.rounds.final.koNum : 32;
            return {
                rounds: {
                    round_of_32: mapArr(data.rounds.round_of_32),
                    round_of_16: mapArr(data.rounds.round_of_16),
                    quarter_finals: mapArr(data.rounds.quarter_finals),
                    semi_finals: mapArr(data.rounds.semi_finals),
                    third_place: data.rounds.third_place ? byKo[data.rounds.third_place.koNum] : null,
                    final: data.rounds.final ? byKo[data.rounds.final.koNum] : null,
                },
                groups: data.groups || {},
                champion: (eff[finalKo] || {}).winner || null,
                championSim: !!((eff[finalKo] || {}).winner && byKo[finalKo] && byKo[finalKo]._simWinner),
                hasPicks: Object.keys(sim.picks).length > 0,
            };
        }

        function wireTabs() {
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const tab = btn.dataset.tab;
                    currentTab = tab;
                    document.getElementById('view-bracket').classList.toggle('hidden', tab !== 'bracket');
                    document.getElementById('view-resumen').classList.toggle('hidden', tab !== 'resumen');
                    document.getElementById('view-groups').classList.toggle('hidden', tab !== 'groups');
                    if (tab === 'bracket') requestAnimationFrame(() => drawConnectors());
                });
            });
        }

        function buildBracketHtml(data) {
            const r = data.rounds;
            const g = data.groups || {};

            const leftR32 = r.round_of_32.filter(m => m.side === 'left');
            const rightR32 = r.round_of_32.filter(m => m.side === 'right');
            const leftR16 = r.round_of_16.filter(m => m.side === 'left');
            const rightR16 = r.round_of_16.filter(m => m.side === 'right');
            const leftQF = r.quarter_finals.filter(m => m.side === 'left');
            const rightQF = r.quarter_finals.filter(m => m.side === 'right');
            const leftSF = r.semi_finals.filter(m => m.side === 'left');
            const rightSF = r.semi_finals.filter(m => m.side === 'right');

            return `
                <div class="sim-bar">
                    <span class="sim-hint">🎮 Haz clic en un equipo para simular su avance</span>
                    ${data.hasPicks ? '<button class="sim-reset" id="simReset">↺ Reiniciar simulación</button>' : ''}
                </div>
                <div class="bracket-wrapper">
                    <div class="bracket" id="bracket">
                        ${renderGroupsPanel(LEFT_GROUPS, g)}
                        ${renderRound('32avos', leftR32)}
                        ${renderRound('Octavos', leftR16)}
                        ${renderRound('Cuartos', leftQF)}
                        ${renderRound('Semifinal', leftSF)}
                        ${renderCenterColumn(r, data.champion, data.championSim)}
                        ${renderRound('Semifinal', rightSF)}
                        ${renderRound('Cuartos', rightQF)}
                        ${renderRound('Octavos', rightR16)}
                        ${renderRound('32avos', rightR32)}
                        ${renderGroupsPanel(RIGHT_GROUPS, g)}
                    </div>
                </div>
            `;
        }

        // ─── Resumen (overview) view ─────────────────────────
        // Máximos goleadores históricos del Mundial (estático, FIFA).
        const ALL_TIME_SCORERS = [
            { name: 'Miroslav Klose',    flag: '🇩🇪', country: 'Alemania',  goals: 16 },
            { name: 'Ronaldo',           flag: '🇧🇷', country: 'Brasil',    goals: 15 },
            { name: 'Gerd Müller',       flag: '🇩🇪', country: 'Alemania',  goals: 14 },
            { name: 'Just Fontaine',     flag: '🇫🇷', country: 'Francia',   goals: 13 },
            { name: 'Lionel Messi',      flag: '🇦🇷', country: 'Argentina', goals: 13 },
            { name: 'Pelé',              flag: '🇧🇷', country: 'Brasil',    goals: 12 },
            { name: 'Kylian Mbappé',     flag: '🇫🇷', country: 'Francia',   goals: 12 },
            { name: 'Sándor Kocsis',     flag: '🇭🇺', country: 'Hungría',   goals: 11 },
            { name: 'Jürgen Klinsmann',  flag: '🇩🇪', country: 'Alemania',  goals: 11 },
            { name: 'Gabriel Batistuta', flag: '🇦🇷', country: 'Argentina', goals: 10 },
        ];

        function buildResumenView(data) {
            const fx = data.fixtures || { recent: [], upcoming: [] };
            return `
                <div class="resumen">
                    <div class="resumen-cols">
                        ${renderFixtureBlock('Próximos partidos', fx.upcoming)}
                        ${renderFixtureBlock('Últimos resultados', fx.recent)}
                    </div>
                    ${renderAllTimeScorers()}
                </div>
            `;
        }

        function renderFixtureBlock(title, list) {
            if (!list || !list.length) {
                return `<div class="fx-block"><div class="fx-title">${title}</div>
                        <div class="fx-empty">Sin partidos</div></div>`;
            }
            const rows = list.map(renderFixtureRow).join('');
            return `<div class="fx-block">
                <div class="fx-title">${title}</div>
                <div class="fx-list">${rows}</div>
            </div>`;
        }

        function renderFixtureRow(e) {
            const finished = e.status === 'finished';
            const live = e.status === 'live';
            const w1 = finished && e.score1 > e.score2;
            const w2 = finished && e.score2 > e.score1;
            const mid = finished
                ? `<span class="fx-score">${e.score1}<span class="fx-dash">-</span>${e.score2}</span>`
                : live
                    ? `<span class="fx-live"><span class="live-dot"></span>${e.score1 ?? 0}-${e.score2 ?? 0}</span>`
                    : `<span class="fx-time">${e.time || ''}</span>`;
            return `
                <div class="fx-row ${live ? 'live' : ''}">
                    <span class="fx-comp">${e.comp}</span>
                    <span class="fx-team r ${w1 ? 'win' : ''}">
                        <span class="fx-name">${e.team1.name}</span>
                        <span class="fx-flag">${e.team1.flag}</span>
                    </span>
                    <span class="fx-mid">${mid}</span>
                    <span class="fx-team l ${w2 ? 'win' : ''}">
                        <span class="fx-flag">${e.team2.flag}</span>
                        <span class="fx-name">${e.team2.name}</span>
                    </span>
                    <span class="fx-date">${e.date}</span>
                </div>`;
        }

        function renderAllTimeScorers() {
            const max = ALL_TIME_SCORERS[0].goals;
            let rows = '';
            ALL_TIME_SCORERS.forEach((p, i) => {
                const pct = Math.round((p.goals / max) * 100);
                rows += `
                    <div class="sc-row">
                        <span class="sc-pos">${i + 1}</span>
                        <span class="sc-flag">${p.flag}</span>
                        <span class="sc-info">
                            <span class="sc-name">${p.name}</span>
                            <span class="sc-country">${p.country}</span>
                        </span>
                        <span class="sc-bar"><span class="sc-bar-fill" style="width:${pct}%"></span></span>
                        <span class="sc-goals">${p.goals}</span>
                    </div>`;
            });
            return `
                <div class="scorers-wrap">
                    <div class="fx-title">Máximos goleadores de todos los tiempos</div>
                    <div class="scorers-list">${rows}</div>
                    <div class="scorers-foot">Goles en fases finales de la Copa Mundial · FIFA</div>
                </div>`;
        }

        // ─── Groups + Best-Thirds view ───────────────────────
        function buildGroupsView(data) {
            const g = data.groups || {};
            let cards = '';
            for (const L of [...LEFT_GROUPS, ...RIGHT_GROUPS]) {
                if (g[L]) cards += renderStandings(L, g[L]);
            }
            return `
                <div class="groups-grid">${cards}</div>
                ${renderThirds(data.bestThirds || [])}
            `;
        }

        function renderStandings(letter, grp) {
            let rows = '';
            for (const t of grp.teams) {
                const dg = t.dg > 0 ? '+' + t.dg : '' + t.dg;
                rows += `
                    <tr class="${t.status || ''}">
                        <td>${t.pos}</td>
                        <td class="flag-cell">${t.flag}</td>
                        <td class="l tname">${t.fullName}</td>
                        <td>${t.pj}</td><td>${t.pg}</td><td>${t.pe}</td><td>${t.pp}</td>
                        <td>${t.gf}</td><td>${t.gc}</td><td>${dg}</td>
                        <td class="pts">${t.pts}</td>
                    </tr>`;
            }
            return `
                <div class="standings ${grp.complete ? 'complete' : ''}">
                    <div class="standings-head">Grupo ${letter}
                        <span class="badge">${grp.complete ? 'Completo' : grp.played + '/' + grp.total}</span>
                    </div>
                    <table class="tbl">
                        <thead><tr>
                            <th>#</th><th></th><th class="l">Equipo</th>
                            <th>J</th><th>G</th><th>E</th><th>P</th>
                            <th>GF</th><th>GC</th><th>DG</th><th>PTS</th>
                        </tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
        }

        function renderThirds(thirds) {
            if (!thirds.length) return '';
            let rows = '';
            for (const t of thirds) {
                const dg = t.dg > 0 ? '+' + t.dg : '' + t.dg;
                const cls = t.eliminated ? 'eliminated' : (t.qualified ? 'qualified' : '');
                rows += `
                    <tr class="${cls}">
                        <td>${t.pos}</td>
                        <td class="flag-cell">${t.flag}</td>
                        <td class="l tname">${t.fullName}</td>
                        <td><span class="grp-badge">${t.group}</span></td>
                        <td>${t.pj}</td><td>${t.pg}</td><td>${t.pe}</td><td>${t.pp}</td>
                        <td>${t.gf}-${t.gc}</td><td>${dg}</td>
                        <td class="pts">${t.pts}</td>
                    </tr>`;
            }
            return `
                <div class="thirds-wrap">
                    <div class="thirds-title">Mejores Equipos En 3.ª Posición</div>
                    <div class="standings">
                        <table class="tbl">
                            <thead><tr>
                                <th>#</th><th></th><th class="l">Equipo</th><th>Gpo</th>
                                <th>J</th><th>G</th><th>E</th><th>P</th>
                                <th>+/-</th><th>DG</th><th>PTS</th>
                            </tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                    <div class="legend">
                        <span><span class="dot" style="background:var(--green)"></span>Clasifican (8 mejores)</span>
                        <span><span class="dot" style="background:var(--text-3)"></span>Eliminado</span>
                    </div>
                </div>`;
        }

        // ─── Groups Panel ────────────────────────────────────
        function renderGroupsPanel(letters, groups) {
            let cards = '';
            for (const letter of letters) {
                const grp = groups[letter];
                if (!grp) continue;
                cards += renderGroupCard(letter, grp);
            }
            return `<div class="groups-panel">${cards}</div>`;
        }

        function renderGroupCard(letter, grp) {
            const complete = grp.complete;
            const statusClass = complete ? 'complete' : '';
            const dotClass = complete ? 'complete' : 'pending';

            let rows = '';
            for (const t of grp.teams) {
                const statusCls = t.status || '';
                const dgStr = t.dg > 0 ? '+' + t.dg : '' + t.dg;
                rows += `
                    <div class="group-team-row ${statusCls}">
                        <span class="gt-pos">${t.pos}</span>
                        <span class="gt-flag">${t.flag}</span>
                        <span class="gt-name">${t.name}</span>
                        <span class="gt-pts">${t.pts}</span>
                        <span class="gt-dg">${dgStr}</span>
                    </div>
                `;
            }

            return `
                <div class="group-card ${statusClass}">
                    <div class="group-title">
                        Grupo ${letter}
                        <span class="status-dot ${dotClass}" title="${complete ? 'Grupo completo' : grp.played + '/' + grp.total + ' jugados'}"></span>
                    </div>
                    ${rows}
                </div>
            `;
        }

        // ─── Round Column ────────────────────────────────────
        function renderRound(label, matches) {
            const matchesHtml = matches.map(m => renderMatchCard(m)).join('');
            return `
                <div class="round" data-round="${label + '-' + (matches[0]?.side || '')}">
                    <div class="round-label">${label}</div>
                    <div class="round-matches">${matchesHtml}</div>
                </div>
            `;
        }

        function renderMatchCard(match) {
            const sc = match.status === 'finished' ? 'finished' :
                       match.status === 'live' ? 'live' : '';
            const wslot = match._pickedSlot || null;        // ganador real o simulado
            const t1W = wslot === 'team1';
            const t2W = wslot === 'team2';
            const hasW = wslot !== null;
            const cls = [sc,
                         match._pickable ? 'pickable' : '',
                         match._simWinner ? 'simulated' : ''].join(' ').trim();

            return `
                <div class="match-card ${cls}" data-match-id="${match.id}" title="${match.team1.fullName} vs ${match.team2.fullName}">
                    ${teamRow(match.team1, 'team1', t1W, hasW && !t1W, match)}
                    ${teamRow(match.team2, 'team2', t2W, hasW && !t2W, match)}
                    <div class="match-date">
                        ${match.status === 'live'
                            ? '<span class="live-indicator"><span class="live-dot"></span> EN VIVO</span>'
                            : match.date}
                    </div>
                </div>
            `;
        }

        function teamRow(team, slot, isW, isL, match) {
            const isTBD = team.placeholder === true || team.name === 'TBD';
            const pickable = match._pickable && !isTBD;
            const cls = [isW ? 'winner' : (isL ? 'loser' : ''), pickable ? 'pickable' : ''].join(' ').trim();
            const nCls = isTBD ? 'team-name tbd' : 'team-name';
            const hasScore = (team.score !== null && team.score !== undefined);
            const hasPen = (team.pen !== null && team.pen !== undefined);
            // En cruces definidos por penales muestra el marcador y, entre
            // paréntesis, los penales: "1 (5)".
            const sc = hasScore
                ? (hasPen ? `${team.score} <span class="team-pen">(${team.pen})</span>` : team.score)
                : '-';
            const sCls = hasScore ? 'team-score' : 'team-score no-score';
            const data = pickable
                ? `data-ko="${match.koNum}" data-slot="${slot}" data-team="${team.fullName}"`
                : '';
            return `
                <div class="team-row ${cls}" ${data}>
                    <span class="team-flag">${team.flag}</span>
                    <span class="${nCls}">${team.name}</span>
                    <span class="${sCls}">${sc}</span>
                </div>
            `;
        }

        // ─── Center Column ───────────────────────────────────
        function renderCenterColumn(rounds, champion, championSim) {
            const f = rounds.final;
            const tp = rounds.third_place;

            let champHtml = champion
                ? `<span class="champion-flag">${champion.flag}</span>
                   <span class="champion-name">${champion.fullName}</span>`
                : '<span class="champion-name" style="color:var(--text-3)">?</span>';

            return `
                <div class="center-column">
                    <div class="champion-area">
                        <span class="trophy">🏆</span>
                        <div class="champion-label">${championSim ? 'Campeón (simulado)' : 'Campeón'}</div>
                        ${champHtml}
                    </div>
                    ${f ? renderMatchCard(f) : ''}
                    ${f ? '<span class="round-tag final-tag">FINAL</span>' : ''}
                    ${tp ? renderMatchCard(tp) : ''}
                    ${tp ? '<span class="round-tag bronze-tag">FINAL DE BRONCE</span>' : ''}
                </div>
            `;
        }

        // ─── SVG Connectors ──────────────────────────────────
        function drawConnectors() {
            const bracket = document.getElementById('bracket');
            if (!bracket) return;

            const old = bracket.querySelector('.connectors-svg');
            if (old) old.remove();

            const bRect = bracket.getBoundingClientRect();
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.classList.add('connectors-svg');
            svg.setAttribute('width', bRect.width);
            svg.setAttribute('height', bRect.height);
            svg.style.width = bRect.width + 'px';
            svg.style.height = bRect.height + 'px';

            const rounds = bracket.querySelectorAll('.round');
            const roundArr = Array.from(rounds);

            // Connect adjacent rounds where source has 2x cards vs target
            for (let i = 0; i < roundArr.length - 1; i++) {
                const src = roundArr[i];
                const tgt = roundArr[i + 1];

                // Skip center column connections
                if (!src.dataset.round || !tgt.dataset.round) continue;

                const srcCards = src.querySelectorAll('.round-matches .match-card');
                const tgtCards = tgt.querySelectorAll('.round-matches .match-card');

                if (srcCards.length === tgtCards.length * 2) {
                    const isRight = src.dataset.round.includes('right');
                    connectPairs(svg, bRect, srcCards, tgtCards, isRight ? 'left' : 'right');
                }
            }

            // Connect semis to final
            connectSemiToFinal(svg, bracket, bRect, 'left');
            connectSemiToFinal(svg, bracket, bRect, 'right');

            bracket.appendChild(svg);
        }

        function connectPairs(svg, bRect, srcCards, tgtCards, dir) {
            for (let i = 0; i < tgtCards.length; i++) {
                const s1 = srcCards[i * 2];
                const s2 = srcCards[i * 2 + 1];
                const t = tgtCards[i];
                if (!s1 || !s2 || !t) continue;

                const s1R = s1.getBoundingClientRect();
                const s2R = s2.getBoundingClientRect();
                const tR = t.getBoundingClientRect();

                const s1Y = s1R.top + s1R.height / 2 - bRect.top;
                const s2Y = s2R.top + s2R.height / 2 - bRect.top;
                const tY = tR.top + tR.height / 2 - bRect.top;

                let s1X, s2X, tX;
                if (dir === 'right') {
                    s1X = s1R.right - bRect.left;
                    s2X = s2R.right - bRect.left;
                    tX = tR.left - bRect.left;
                } else {
                    s1X = s1R.left - bRect.left;
                    s2X = s2R.left - bRect.left;
                    tX = tR.right - bRect.left;
                }

                const mX = (s1X + tX) / 2;
                const isActive = el => el.classList.contains('finished') || el.classList.contains('simulated');
                const active = isActive(s1) || isActive(s2);
                const cls = active ? 'connector-line active' : 'connector-line';

                addL(svg, s1X, s1Y, mX, s1Y, cls);
                addL(svg, mX, s1Y, mX, tY, cls);
                addL(svg, s2X, s2Y, mX, s2Y, cls);
                addL(svg, mX, s2Y, mX, tY, cls);
                addL(svg, mX, tY, tX, tY, cls);
            }
        }

        function connectSemiToFinal(svg, bracket, bRect, side) {
            const semiRound = bracket.querySelector(`[data-round="Semifinal-${side}"]`);
            const center = bracket.querySelector('.center-column');
            if (!semiRound || !center) return;

            const sCard = semiRound.querySelector('.match-card');
            const fCards = center.querySelectorAll('.match-card');
            const fCard = fCards[0];
            if (!sCard || !fCard) return;

            const sR = sCard.getBoundingClientRect();
            const tR = fCard.getBoundingClientRect();
            const sY = sR.top + sR.height / 2 - bRect.top;
            const tY = tR.top + tR.height / 2 - bRect.top;

            let sX, tX;
            if (side === 'left') {
                sX = sR.right - bRect.left;
                tX = tR.left - bRect.left;
            } else {
                sX = sR.left - bRect.left;
                tX = tR.right - bRect.left;
            }

            const mX = (sX + tX) / 2;
            const active = sCard.classList.contains('finished') || sCard.classList.contains('simulated');
            const cls = active ? 'connector-line active' : 'connector-line';

            addL(svg, sX, sY, mX, sY, cls);
            addL(svg, mX, sY, mX, tY, cls);
            addL(svg, mX, tY, tX, tY, cls);
        }

        function addL(svg, x1, y1, x2, y2, cls) {
            const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            l.setAttribute('x1', x1); l.setAttribute('y1', y1);
            l.setAttribute('x2', x2); l.setAttribute('y2', y2);
            l.setAttribute('class', cls);
            svg.appendChild(l);
        }

        // ─── Interacción de simulación (delegación única) ────
        document.addEventListener('click', (e) => {
            if (e.target.closest('#simReset')) {
                sim.picks = {};
                renderApp(DATA);
                return;
            }
            const row = e.target.closest('.team-row.pickable');
            if (row && row.dataset.ko) {
                const ko = +row.dataset.ko, slot = row.dataset.slot, team = row.dataset.team;
                if (sim.picks[ko] && sim.picks[ko].slot === slot) delete sim.picks[ko];  // toggle off
                else sim.picks[ko] = { slot, team };
                renderApp(DATA);
            }
        });

        let rt;
        window.addEventListener('resize', () => { clearTimeout(rt); rt = setTimeout(drawConnectors, 200); });
        document.addEventListener('DOMContentLoaded', init);
        setInterval(init, 5 * 60 * 1000);
    })();
    </script>
</body>
</html>
