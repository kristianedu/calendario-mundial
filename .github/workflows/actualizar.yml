name: Actualizar Calendario Mundial 2026

on:
  push:
    branches:
      - main
  schedule:
    # Se ejecuta cada 5 minutos
    - cron: '*/5 * * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Probar conexión a la API
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "Haciendo prueba de conexión..."
          curl -s -H "x-apisports-key: $API_KEY" https://v3.football.api-sports.io/status

      - name: Generar calendario dinámico
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python generador.py

      - name: Publicar en GitHub Pages
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          git reset --hard
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/mundial_2026_dinamico.ics .
          git add mundial_2026_dinamico.ics
          git commit -m "Update calendar" || echo "No changes to commit"
          git push origin gh-pages
