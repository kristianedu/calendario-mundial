name: Actualizar Calendario Mundial 2026

on:
  push:
    branches:
      - main
  schedule:
    # Marcadores en vivo: cada 5 minutos
    - cron: '*/5 * * * *'
    # Clasificados eliminatorias: a las 06:00 UTC (medianoche El Salvador)
    - cron: '0 6 * * *'
    # Cuotas de apuestas: cada 2 horas
    - cron: '0 */2 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  # Job 1: Actualizar clasificados (solo a medianoche o manualmente)
  actualizar-clasificados:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar clasificados en eliminatorias
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python actualizar_clasificados.py

      - name: Guardar cambios en base_mundial.ics
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add base_mundial.ics
          if git commit -m "Actualizar equipos clasificados en eliminatorias"; then
            git pull origin main --rebase
            git push
          else
            echo "No hay cambios para subir"
          fi

  # Job 2: Marcadores en vivo (cada 5 minutos o al hacer push)
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar calendario dinámico
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python generador.py

      - name: Publicar en GitHub Pages
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          git reset --hard
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/mundial_2026_dinamico.ics .
          git add mundial_2026_dinamico.ics
          git commit -m "Update calendar" || echo "No changes to commit"
          git push origin gh-pages

  # Job 3: Actualizar cuotas de apuestas (cada 2 horas)
  actualizar-cuotas:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event.schedule == '0 */2 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar cuotas de apuestas
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python actualizar_cuotas.py

      - name: Guardar cambios en base_mundial.ics
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add base_mundial.ics
          if git commit -m "Actualizar cuotas de apuestas"; then
            git pull origin main --rebase
            git push
          else
            echo "No hay cambios para subir"
          fi
