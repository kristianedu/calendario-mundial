name: Actualizar Clasificados

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  # Grupo compartido con los demás workflows que escriben en el repo,
  # para serializar los pushes a main y evitar choques entre ellos.
  group: repo-writes
  cancel-in-progress: false

jobs:
  actualizar-clasificados:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Actualizar clasificados en eliminatorias
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python actualizar_clasificados.py

      - name: Generar datos del bracket eliminatorio
        run: python generar_bracket.py

      - name: Guardar cambios en base_mundial.ics
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add base_mundial.ics
          if git commit -m "Actualizar equipos clasificados en eliminatorias"; then
            git pull origin main --rebase
            git push
          else
            echo "No hay cambios para subir"
          fi
