name: Marcadores en Vivo

on:
  schedule:
    # Cada 5 min, solo horas de partidos (08:00-00:59 CST = 14:00-06:59 UTC), jun-jul
    - cron: '*/5 14-23,0-6 * 6-7 *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Enviar la captura al grupo de WhatsApp aunque no haya partido nuevo (prueba)'
        type: boolean
        default: false

concurrency:
  group: en-vivo
  # Las corridas nuevas hacen cola en vez de cancelar la que está en curso,
  # para no interrumpir el envío de la notificación a mitad de camino.
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar calendario dinámico y guardar resultados finales
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python generador.py

      - name: Generar datos del bracket eliminatorio
        run: python generar_bracket.py

      - name: Guardar resultados finales permanentes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          git checkout -- mundial_2026_dinamico.ics
          git add base_mundial.ics
          if git diff --staged --quiet; then
            echo "No hay marcadores finales para guardar."
          else
            git commit -m "Guardar marcadores finales permanentemente"
            git pull origin main --rebase
            git push origin main
          fi
          cp /tmp/mundial_2026_dinamico.ics mundial_2026_dinamico.ics

      - name: Publicar en GitHub Pages
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          cp bracket_data.json /tmp/bracket_data.json
          cp bracket.html /tmp/bracket.html
          cp trofeo.png /tmp/trofeo.png
          # El notificador vive en main; la rama gh-pages no lo tiene, así que lo
          # guardamos para ejecutarlo luego desde /tmp (el paso corre sobre gh-pages).
          cp notificar_whatsapp.py /tmp/notificar_whatsapp.py
          git reset --hard
          git fetch origin gh-pages
          git checkout gh-pages
          # Guardar el bracket ANTERIOR ya publicado para detectar qué partidos
          # finalizaron (lo usa notificar_whatsapp.py). Si aún no existe, se omite.
          cp bracket_data.json /tmp/old_bracket_data.json || true
          cp /tmp/mundial_2026_dinamico.ics .
          cp /tmp/bracket_data.json .
          cp /tmp/bracket.html .
          cp /tmp/trofeo.png .
          git add mundial_2026_dinamico.ics bracket_data.json bracket.html trofeo.png
          git commit -m "Update calendar & bracket (Live)" || echo "No changes to commit"
          git pull origin gh-pages --rebase || true
          git push origin gh-pages

      - name: Notificar WhatsApp con screenshot del bracket
        # PAUSADO mientras se corrige el bug de orientación de marcadores.
        # Reactivar cambiando a: if: success()
        if: false
        continue-on-error: true
        env:
          GREENAPI_ID: ${{ secrets.GREENAPI_ID }}
          GREENAPI_TOKEN: ${{ secrets.GREENAPI_TOKEN }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
          PREV_BRACKET_JSON: /tmp/old_bracket_data.json
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        run: |
          pip install playwright
          playwright install chromium --with-deps
          # Se ejecuta desde /tmp porque el working dir está en la rama gh-pages,
          # que no contiene el script. Lee bracket_data.json / bracket.html del cwd.
          python /tmp/notificar_whatsapp.py
