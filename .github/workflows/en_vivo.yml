name: Marcadores en Vivo

on:
  schedule:
    # Cada 5 min, solo horas de partidos (08:00-00:59 CST = 14:00-06:59 UTC), jun-jul
    - cron: '*/5 14-23,0-6 * 6-7 *'
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: en-vivo
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar calendario dinámico y guardar resultados finales
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python generador.py

      - name: Generar datos del bracket eliminatorio
        run: python generar_bracket.py

      - name: Guardar resultados finales permanentes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          git checkout -- mundial_2026_dinamico.ics
          git add base_mundial.ics
          if git diff --staged --quiet; then
            echo "No hay marcadores finales para guardar."
          else
            git commit -m "Guardar marcadores finales permanentemente"
            git pull origin main --rebase
            git push origin main
          fi
          cp /tmp/mundial_2026_dinamico.ics mundial_2026_dinamico.ics

      - name: Publicar en GitHub Pages
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          cp bracket_data.json /tmp/bracket_data.json
          cp bracket.html /tmp/bracket.html
          git reset --hard
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/mundial_2026_dinamico.ics .
          cp /tmp/bracket_data.json .
          cp /tmp/bracket.html .
          git add mundial_2026_dinamico.ics bracket_data.json bracket.html
          git commit -m "Update calendar & bracket (Live)" || echo "No changes to commit"
          git pull origin gh-pages --rebase || true
          git push origin gh-pages

      - name: Notificar WhatsApp con screenshot del bracket
        if: success()
        continue-on-error: true
        env:
          GREENAPI_ID: ${{ secrets.GREENAPI_ID }}
          GREENAPI_TOKEN: ${{ secrets.GREENAPI_TOKEN }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
        run: |
          pip install playwright
          playwright install chromium --with-deps
          python notificar_whatsapp.py
