name: Marcadores en Vivo

on:
  schedule:
    # Cada 5 min, solo horas de partidos (08:00-00:59 CST = 14:00-06:59 UTC), jun-jul
    - cron: '*/5 14-23,0-6 * 6-7 *'
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_notify:
        description: 'Enviar la captura al grupo de WhatsApp aunque no haya partido nuevo (prueba)'
        type: boolean
        default: false

concurrency:
  # Grupo compartido con los demás workflows que escriben en el repo,
  # para serializar los pushes a main y evitar choques entre ellos.
  # Las corridas nuevas hacen cola en vez de cancelar la que está en curso,
  # para no interrumpir el envío de la notificación a mitad de camino.
  group: repo-writes
  cancel-in-progress: false

env:
  # Versión fija de Playwright para que el cache de navegadores sea estable
  PLAYWRIGHT_VERSION: '1.61.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar calendario dinámico y guardar resultados finales
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python generador.py

      - name: Generar datos del bracket eliminatorio
        run: python generar_bracket.py

      - name: Guardar resultados finales permanentes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          git checkout -- mundial_2026_dinamico.ics
          git add base_mundial.ics
          if git diff --staged --quiet; then
            echo "No hay marcadores finales para guardar."
          else
            git commit -m "Guardar marcadores finales permanentemente"
            git pull origin main --rebase
            git push origin main
          fi
          cp /tmp/mundial_2026_dinamico.ics mundial_2026_dinamico.ics

      - name: Publicar en GitHub Pages
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          cp mundial_2026_dinamico.ics /tmp/mundial_2026_dinamico.ics
          cp bracket_data.json /tmp/bracket_data.json
          cp bracket.html /tmp/bracket.html
          cp trofeo.png /tmp/trofeo.png
          # El notificador vive en main; la rama gh-pages no lo tiene, así que lo
          # guardamos para ejecutarlo luego desde /tmp (el paso corre sobre gh-pages).
          cp notificar_whatsapp.py /tmp/notificar_whatsapp.py
          git reset --hard
          git fetch origin gh-pages
          git checkout gh-pages
          # Guardar el bracket ANTERIOR ya publicado para detectar qué partidos
          # finalizaron (lo usa notificar_whatsapp.py). Si aún no existe, se omite.
          cp bracket_data.json /tmp/old_bracket_data.json || true
          cp /tmp/mundial_2026_dinamico.ics .
          cp /tmp/bracket_data.json .
          cp /tmp/bracket.html .
          cp /tmp/trofeo.png .
          git add mundial_2026_dinamico.ics bracket_data.json bracket.html trofeo.png
          git commit -m "Update calendar & bracket (Live)" || echo "No changes to commit"
          git pull origin gh-pages --rebase || true
          git push origin gh-pages

      - name: Detectar si hubo cambios que ameriten notificación
        # Paso ligero que replica la detección mínima de notificar_whatsapp.py
        # (detectar_eventos) para no instalar Playwright+Chromium en cada corrida:
        # compara el bracket recién generado contra el anterior ya publicado.
        id: cambios
        run: |
          python - <<'EOF'
          import json, os

          def cargar(path):
              try:
                  with open(path, encoding="utf-8") as f:
                      return json.load(f) or None
              except (FileNotFoundError, json.JSONDecodeError):
                  return None

          RONDAS_LISTA = ["round_of_32", "round_of_16", "quarter_finals", "semi_finals"]
          RONDAS_UNICAS = ["third_place", "final"]

          def finalizados(data):
              res = {}
              rounds = (data or {}).get("rounds", {}) or {}
              for key in RONDAS_LISTA:
                  for p in rounds.get(key) or []:
                      if p.get("status") == "finished":
                          res[p["id"]] = p
              for key in RONDAS_UNICAS:
                  p = rounds.get(key)
                  if p and p.get("status") == "finished":
                      res[p["id"]] = p
              return res

          def firma(p):
              return (p["team1"].get("fullName"), p["team1"].get("score"),
                      p["team2"].get("score"), p["team2"].get("fullName"))

          def grupos(data):
              return {L: info.get("played", 0)
                      for L, info in ((data or {}).get("groups") or {}).items()}

          viejo = cargar("/tmp/old_bracket_data.json")
          nuevo = cargar("/tmp/bracket_data.json")

          if viejo is None:
              # Primer despliegue: dejar correr al notificador para que
              # establezca la línea base (él mismo decide no enviar).
              hubo = True
          else:
              viejo_ko = finalizados(viejo)
              # Cruces KO recién finalizados o con marcador corregido
              hubo = any(
                  mid not in viejo_ko or firma(viejo_ko[mid]) != firma(p)
                  for mid, p in finalizados(nuevo).items()
              )
              # Grupos con más partidos jugados que antes
              if not hubo:
                  viejo_g = grupos(viejo)
                  hubo = any(j > viejo_g.get(L, 0) for L, j in grupos(nuevo).items())

          valor = "true" if hubo else "false"
          print(f"hubo_cambios={valor}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"hubo_cambios={valor}\n")
          EOF

      - name: Cachear navegadores de Playwright
        if: steps.cambios.outputs.hubo_cambios == 'true' || github.event.inputs.force_notify == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}

      - name: Notificar WhatsApp con screenshot del bracket
        # TEMPORAL: desactivado mientras se publica la corrección manual del
        # marcador Portugal-Croacia, para que el detector no la anuncie como
        # partido nuevo. Restaurar a:
        #   if: steps.cambios.outputs.hubo_cambios == 'true' || github.event.inputs.force_notify == 'true'
        if: false
        continue-on-error: true
        env:
          GREENAPI_ID: ${{ secrets.GREENAPI_ID }}
          GREENAPI_TOKEN: ${{ secrets.GREENAPI_TOKEN }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
          PREV_BRACKET_JSON: /tmp/old_bracket_data.json
          FORCE_NOTIFY: ${{ github.event.inputs.force_notify }}
        run: |
          pip install playwright==${PLAYWRIGHT_VERSION}
          playwright install chromium --with-deps
          # Se ejecuta desde /tmp porque el working dir está en la rama gh-pages,
          # que no contiene el script. Lee bracket_data.json / bracket.html del cwd.
          python /tmp/notificar_whatsapp.py
